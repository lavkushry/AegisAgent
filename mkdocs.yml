site_name: AegisAgent Documentation
site_description: The integrity layer for AI agent actions — delivered as an integrity-anchored Agent SOC.
site_author: AegisAgent
site_url: https://lavkushry.github.io/AegisAgent/

repo_url: https://github.com/lavkushry/AegisAgent
repo_name: lavkushry/AegisAgent
edit_uri: edit/main/docs/
docs_dir: docs
copyright: Open, self-hostable, framework-neutral.

theme:
  name: material
  language: en
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# Internal strategy/PM docs stay in the repo but are NOT published to the site.
exclude_docs: |
  README.md
  AegisAgent_Vision.md
  AegisAgent_Gap_Reassessment_2026-06.md
  AegisAgent_PRD.md
  AegisAgent_Problem_Definition.md
  AegisAgent_Market_Gap_Analysis.md
  AegisAgent_Product_Research.md
  AegisAgent_GTM_Document.md

nav:
  - Home: index.md
  - Mission: mission.md
  - Getting started:
      - Overview: getting-started.md
      - 10-minute quickstart: quickstart.md
  - Installation: installation.md
  - Demos:
      - Approve-then-swap blocked: approve-then-swap-demo.md
  - Integration & connectivity:
      - Overview: AegisAgent_Integration_Connectivity.md
      - GitHub App integration: github-integration.md
      - Slack integration: slack-integration.md
  - User manual:
      - The Agent SOC: AegisAgent_Agent_SOC_Design.md
      - SOC Console UI: AegisAgent_SOC_UI_Design.md
      - Agent workforce governance: AegisAgent_Agent_Workforce_Governance.md
      - Runbooks:
          - Overview: runbooks/index.md
          - Deny storm: runbooks/deny-storm.md
          - Data exfiltration pattern: runbooks/data-exfiltration.md
          - Agent token rotation: runbooks/agent-token-rotation.md
          - Backup and restore: runbooks/backup-and-restore.md
          - Receipt chain verification: runbooks/receipt-chain-verification.md
          - Secret rotation: runbooks/secret-rotation.md
  - Architecture:
      - Technical design: AegisAgent_Technical_Design.md
      - Agent workflow: AegisAgent_Agent_Workflow.md
      - Threat model: AegisAgent_Threat_Model.md
      - Operational design: AegisAgent_Operational_Design.md
      - MCP defense architecture: mcp-defense-architecture.md
      - Decision records:
          - Overview: adr/index.md
          - "ADR-0001: Cedar policy engine": adr/0001-cedar-policy-engine.md
          - "ADR-0002: SQLite-first storage": adr/0002-sqlite-first-storage.md
          - "ADR-0003: aegis-jcs-1 canonicalization": adr/0003-aegis-jcs-1-canonicalization.md
          - "ADR-0004: Ed25519 receipt signing": adr/0004-ed25519-receipt-signing.md
          - "ADR-0005: Fail-closed defaults": adr/0005-fail-closed-defaults.md
  - Reference:
      - API reference (OpenAPI/Redoc): api-reference.md
      - Runtime authorization API: runtime-authorization-api.md
      - Fail-closed behavior guide: fail-closed-behavior.md
      - Action receipt spec: action-receipt-spec.md
      - Evidence graph: evidence-graph.md
      - Database schema (ERD): database-schema.md
      - SDK parity status: sdk-parity-status.md
