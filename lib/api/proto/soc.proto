syntax = "proto3";

package aegis;

service SocService {
    rpc ListAlerts (ListAlertsRequest) returns (ListAlertsResponse);
    rpc ListIncidents (ListIncidentsRequest) returns (ListIncidentsResponse);
    rpc CloseIncident (CloseIncidentRequest) returns (CloseIncidentResponse);
    rpc CreatePlaybook (CreatePlaybookRequest) returns (CreatePlaybookResponse);
    rpc ListPlaybooks (ListPlaybooksRequest) returns (ListPlaybooksResponse);
    rpc DeletePlaybook (DeletePlaybookRequest) returns (DeletePlaybookResponse);
    rpc SemanticSearch (SemanticSearchRequest) returns (SemanticSearchResponse);
    rpc Query (SocQueryRequest) returns (SocQueryResponse);
}

// Structured, tenant-scoped query contract shared by Explore and dashboards.
// Fields and aggregate values are server-side allowlists; no raw SQL is accepted.
message SocQueryFilters {
    string agent_id = 1;
    string decision = 2;
    string source_trust = 3;
    string skill = 4;
    string from = 5;
    string to = 6;
    string q = 7;
    string action = 8;
    string resource = 9;
    string run_id = 10;
    string trace_id = 11;
    string action_hash = 12;
    string receipt_hash = 13;
    string tool = 14;
}

message SocQueryRequest {
    string tenant_id = 1;
    string entity = 2;
    SocQueryFilters filters = 3;
    string aggregate = 4;
    string interval = 5;
    optional int64 limit = 6;
    optional int64 cursor = 7;
    uint32 version = 8;
    string group_by = 9;
}

message SocQueryResponse {
    // JSON preserves parity with the REST response while the query result can
    // represent row, count, and time-series shapes.
    string result_json = 1;
}

message CreatePlaybookRequest {
    string tenant_id = 1;
    string name = 2;
    string trigger_kind = 3;
    repeated string trigger_severity = 4;
    string trigger_agent_id = 5;
    string trigger_environment = 6;
    string steps_json = 7;
}

message PlaybookItem {
    string id = 1;
    string tenant_id = 2;
    string name = 3;
    string trigger_kind = 4;
    repeated string trigger_severity = 5;
    string trigger_agent_id = 6;
    string trigger_environment = 7;
    string steps_json = 8;
    bool enabled = 9;
    string created_at = 10;
}

message CreatePlaybookResponse {
    PlaybookItem playbook = 1;
}

message ListPlaybooksRequest {
    string tenant_id = 1;
}

message ListPlaybooksResponse {
    repeated PlaybookItem items = 1;
}

message DeletePlaybookRequest {
    string tenant_id = 1;
    string id = 2;
}

message DeletePlaybookResponse {
    bool success = 1;
}

message ListAlertsRequest {
    string tenant_id = 1;
    string agent_id = 2;
    int64 limit = 3;
    string cursor = 4;
}

message AlertItem {
    string id = 1;
    string tenant_id = 2;
    string rule = 3;
    string severity = 4;
    string agent_id = 5;
    string source_event_id = 6;
    string summary = 7;
    string created_at = 8;
}

message ListAlertsResponse {
    repeated AlertItem items = 1;
    string next_cursor = 2;
}

message ListIncidentsRequest {
    string tenant_id = 1;
    string agent_id = 2;
    int64 limit = 3;
    string cursor = 4;
}

message IncidentItem {
    string id = 1;
    string tenant_id = 2;
    string kind = 3;
    string severity = 4;
    string agent_id = 5;
    string summary = 6;
    repeated string source_event_ids = 7;
    string opened_at = 8;
    string status = 9;
    string closed_at = 10;
}

message ListIncidentsResponse {
    repeated IncidentItem items = 1;
    string next_cursor = 2;
}

message CloseIncidentRequest {
    string tenant_id = 1;
    string incident_id = 2;
    string reason = 3;
}

message CloseIncidentResponse {
    string status = 1;
    string incident_id = 2;
}

// #1451: Semantic search over Qdrant-indexed audit events.
message SemanticSearchRequest {
    string tenant_id = 1;
    string query = 2;
    int64 limit = 3; // 0 means server default (10)
}

message SemanticSearchResult {
    string event_id = 1;
    string occurred_at = 2;
    string tenant_id = 3;
    string kind = 4;
    string agent_id = 5;
    string decision = 6;
    string tool = 7;
    string action = 8;
    string resource = 9;
    int64 risk_score = 10;
    string reason = 11;
    string run_id = 12;
    string trace_id = 13;
    repeated string matched_policies = 14;
    double similarity_score = 15;
}

message SemanticSearchResponse {
    repeated SemanticSearchResult results = 1;
}
