services:
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    image: aegisagent-gateway:local
    network_mode: host
    environment:
      DATABASE_URL: sqlite:///data/aegis.db
      CEDAR_POLICY_PATH: /app/policies.cedar
      RUST_LOG: info,gateway=debug,sqlx=info
    volumes:
      - ./data:/data
      - ./policies.cedar:/app/policies.cedar:ro
    healthcheck:
      # #1207: the distroless runtime image has no curl/shell — the binary
      # execs itself with --healthcheck instead (see gateway/Dockerfile and
      # main.rs's check_liveness).
      test: ["CMD", "/usr/local/bin/aegis-gateway", "--healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
