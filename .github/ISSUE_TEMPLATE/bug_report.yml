name: Bug report
description: Report a defect in the gateway, SDK, policy pack, or receipts.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. **Do not report security vulnerabilities here** —
        use private GitHub Security Advisories (see SECURITY.md).
  - type: input
    id: component
    attributes:
      label: Component
      description: Which part is affected?
      placeholder: gateway / python-sdk / cedar policy / receipts / canonicalization / docs
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: e.g. commit 3dee321 or v0.1.0
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps, commands, or code. Redact any secrets.
      render: shell
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Rust/Python versions, Docker version (if relevant).
    validations:
      required: false
