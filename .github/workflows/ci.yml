name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gateway:
    name: Gateway checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gateway
      - name: Check formatting
        run: cargo fmt --manifest-path gateway/Cargo.toml -- --check
      - name: Clippy
        run: cargo clippy --manifest-path gateway/Cargo.toml -- -D warnings
      - name: Tests
        run: cargo test --manifest-path gateway/Cargo.toml

  python-sdk:
    name: Python SDK tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install SDK
        run: python -m pip install -e sdk-python
      - name: Tests
        run: python -m unittest discover -s sdk-python/tests
