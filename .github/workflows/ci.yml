name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gateway:
    name: Gateway checks (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gateway
      - name: Check formatting
        run: cargo fmt --manifest-path gateway/Cargo.toml -- --check
      - name: Clippy
        run: cargo clippy --manifest-path gateway/Cargo.toml -- -D warnings
      - name: Tests
        run: cargo test --manifest-path gateway/Cargo.toml

  python-sdk:
    name: Python SDK (lint + tests + demo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install SDK (with dev tools)
        run: python -m pip install -e "sdk-python[dev]"
      - name: Black format check
        run: python -m black --check sdk-python/ examples/
      - name: Unit tests
        run: python -m unittest discover -s sdk-python/tests
      - name: Integrity demo smoke test (no network)
        run: python examples/integrity_demo.py

  security-audit:
    name: Dependency audit (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        working-directory: gateway
        run: cargo audit
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: pip-audit
        run: |
          python -m pip install pip-audit
          python -m pip install -e sdk-python
          pip-audit --progress-spinner off || true
