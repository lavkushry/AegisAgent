# Release Publish — build and publish artifacts after a release is created.
#
# Triggered when release-please creates a new GitHub Release (via tag push).
# Builds a production Docker image, pushes to ghcr.io, generates an SBOM,
# and attaches artifacts to the GitHub Release.

name: Release Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Build and push Docker image ────────────────────────────────────────────
  docker:
    name: Docker image (ghcr.io)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag with the SemVer version (e.g. 0.1.0-beta.1)
            type=semver,pattern={{version}}
            # Tag with major.minor (e.g. 0.1)
            type=semver,pattern={{major}}.{{minor}}
            # Tag :latest only for stable (non-prerelease) versions
            type=raw,value=latest,enable=${{ !contains(github.ref, 'beta') && !contains(github.ref, 'alpha') && !contains(github.ref, 'rc') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Generate SBOM and attach to release ────────────────────────────────────
  sbom:
    name: SBOM generation
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - uses: actions/checkout@v7

      - name: Generate Rust SBOM (cargo-cyclonedx)
        run: |
          cargo install cargo-cyclonedx --locked
          cargo cyclonedx --format json --output-file aegisagent-sbom.json

      - name: Upload SBOM to release
        uses: softprops/action-gh-release@v3
        with:
          files: aegisagent-sbom.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Release summary ───────────────────────────────────────────────────────
  summary:
    name: Release summary
    runs-on: ubuntu-latest
    needs: [docker, sbom]
    steps:
      - name: Publish summary
        run: |
          echo "### 🚀 Release Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag:** \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Docker:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **SBOM:** Attached to [release](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }})" >> "$GITHUB_STEP_SUMMARY"
