name: Container Image Scan

# CI-007 (#1176): scan the gateway's distroless Docker image (#1207) for
# OS-level and library CVEs on every build via Trivy. CRITICAL/HIGH findings
# fail the job (blocking merge); results are uploaded as SARIF to the GitHub
# Security tab regardless of pass/fail so findings stay visible even when a
# maintainer needs to merge past a transient/false-positive advisory.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  trivy:
    name: Trivy container scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - name: Build gateway image
        run: docker build -f gateway/Dockerfile -t aegis-gateway:scan .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.29.0
        with:
          image-ref: aegis-gateway:scan
          format: sarif
          output: trivy-results.sarif
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
      - name: Upload Trivy scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
