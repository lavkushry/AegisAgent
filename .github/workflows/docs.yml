name: Docs

# Build the MkDocs site and publish it to GitHub Pages (gh-pages branch).
# After the first successful run, enable Pages: Settings → Pages → Source: "Deploy from a branch" → gh-pages.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/docs.yml"
      # #1198: the published Redoc API reference (docs/api/index.html) reads
      # a fresh docs/api/openapi.json generated from these route annotations
      # on every push, so a gateway-only change that alters the API surface
      # must redeploy the site even though nothing under docs/ changed.
      - "src/src/**"
      - "src/Cargo.toml"
      - "src/Cargo.lock"
      - "lib/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install MkDocs Material
        run: pip install -r requirements-docs.txt
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          key: export-openapi
      # #1198 (DOC-003): regenerate the static OpenAPI snapshot the Redoc
      # page reads, fresh from route metadata — never a checked-in artifact
      # that can drift from the real API surface. Pure compile-time route
      # metadata (utoipa derive macros): no database, no running gateway.
      - name: Export OpenAPI spec for Redoc
        working-directory: src
        run: cargo run --release --bin export_openapi > ../docs/api/openapi.json
      - name: Build and deploy
        run: mkdocs gh-deploy --force --no-history
