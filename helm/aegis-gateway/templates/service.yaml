apiVersion: v1
kind: Service
metadata:
  name: {{ include "aegis-gateway.fullname" . }}
  labels:
    {{- include "aegis-gateway.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: rest
      port: {{ .Values.service.restPort }}
      targetPort: rest
      protocol: TCP
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
  selector:
    {{- include "aegis-gateway.selectorLabels" . | nindent 4 }}
