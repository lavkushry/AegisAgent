{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "aegis-gateway.fullname" . }}
  labels:
    {{- include "aegis-gateway.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "aegis-gateway.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- range .Values.networkPolicy.allowedPodSelectors }}
        - podSelector:
            {{- toYaml . | nindent 12 }}
        {{- end }}
        {{- range .Values.networkPolicy.allowedNamespaceSelectors }}
        - namespaceSelector:
            {{- toYaml . | nindent 12 }}
        {{- end }}
      ports:
        - port: rest
          protocol: TCP
        - port: grpc
          protocol: TCP
{{- end }}
